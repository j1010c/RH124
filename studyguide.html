              "Context management: `chcon -t TYPE file` (temporary, lost on relabel), `semanage fcontext -a -t TYPE '/path(/.*)?'` + `restorecon -Rv /path` (PERMANENT). Use semanage for persistence.",
              "Booleans: on/off switches for policy rules. `getsebool -a` (list all), `setsebool boolean on/off` (temporary), `setsebool -P boolean on/off` (PERSISTENT). `semanage boolean -l` (with descriptions).",

          {/* BOTTOM NAV */}
          <div style={{ background: "#0c0c0c", borderTop: "1px solid #1a1a1a", padding: "8px 24px", display: "flex", alignItems: "center", gap: "16px", flexShrink: 0 }}>
            <button onClick={() => { if (activeChapter > 0) { setActiveChapter(activeChapter - 1); setActiveTab("summary"); } }} style={{ background: "transparent", border: "1px solid #222", color: "#555", padding: "4px 12px", borderRadius: "3px", cursor: "pointer", fontSize: "11px", fontFamily: "inherit" }}>
              ← Prev
            </button>
            <div style={{ flex: 1, background: "#1a1a1a", borderRadius: "2px", height: "4px" }}>
              <div style={{ height: "100%", background: course.color, width: `${((activeChapter + 1) / course.chapters.length) * 100}%`, borderRadius: "2px", transition: "width 0.3s" }} />
            </div>
            <span style={{ fontSize: "10px", color: "#444", letterSpacing: "1px", minWidth: "100px", textAlign: "center" }}>
              {activeChapter + 1} / {course.chapters.length} chapters
            </span>
            <div style={{ flex: 1, background: "#1a1a1a", borderRadius: "2px", height: "4px" }} />
            <button onClick={() => { if (activeChapter < course.chapters.length - 1) { setActiveChapter(activeChapter + 1); setActiveTab("summary"); } }} style={{ background: "transparent", border: "1px solid #222", color: "#555", padding: "4px 12px", borderRadius: "3px", cursor: "pointer", fontSize: "11px", fontFamily: "inherit" }}>
              Next →
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<RHCSAMaster />);
  </script>

</body>
</html>
